name: Build Desktop

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build_desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS Apple Silicon
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
            rust_target: aarch64-apple-darwin
          # macOS Intel
          - platform: macos-13
            args: '--target x86_64-apple-darwin'
            rust_target: x86_64-apple-darwin
          # Windows x64
          - platform: windows-latest
            args: ''
            rust_target: x86_64-pc-windows-msvc
          # Linux x64
          - platform: ubuntu-22.04
            args: ''
            rust_target: x86_64-unknown-linux-gnu

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            libssl-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: frontend/src-tauri -> target

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install frontend dependencies
        working-directory: frontend
        run: bun install --frozen-lockfile

      - name: Build desktop app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: frontend
          args: ${{ matrix.args }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ticklist-desktop-${{ matrix.rust_target }}
          path: |
            frontend/src-tauri/target/**/release/bundle/**/*.dmg
            frontend/src-tauri/target/**/release/bundle/**/*.app
            frontend/src-tauri/target/**/release/bundle/**/*.msi
            frontend/src-tauri/target/**/release/bundle/**/*-setup.exe
            frontend/src-tauri/target/**/release/bundle/**/*.AppImage
            frontend/src-tauri/target/**/release/bundle/**/*.deb
          if-no-files-found: warn
          retention-days: 30
